<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
          name="viewport">
    <meta content="ie=edge" http-equiv="X-UA-Compatible">
    <script src="pixi-8-13-2.min.js"></script>
    <link crossorigin="anonymous" href="https://igordurbek.b-cdn.net/crofavicon.png" rel="icon">
    <link crossorigin="anonymous" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" rel="stylesheet">
    <title>Pixijsfebruary</title>
    <style>
        body {
            background-color: #BDBDBD
        }

        #pixijsfebruary {
            width: 700px;
            height: 500px;
            margin: auto;
            border: 1px solid black;
            aspect-ratio: 4/3;
        }
    </style>
</head>
<body>
<div id="pixijsfebruary" role="main"></div>
<div class="d-flex flex-row justify-content-center gap-2 mt-3" id="buttons">
    <button class="btn btn-primary" id="btn-h">[ H ]</button>
    <button class="btn btn-primary" id="btn-j">[ J ]</button>
    <button class="btn btn-primary" id="btn-k">[ K ]</button>
    <button class="btn btn-primary" id="btn-l">[ L ]</button>
</div>
<script>
    (async () => {
        const div = document.getElementById('pixijsfebruary');
        const app = new PIXI.Application();
        await app.init({
            background: '#455A64',
            resizeTo: div
        });
        const g = new PIXI.Graphics();
        for (let ix = 0; ix < 69; ix++) {
            for (let jy = 0; jy < 69; jy++) {
                g.rect(-100 + ix * 30, -100 + jy * 30, 10, 10);
                g.fill(0x757575);
                g.stroke({color: 0x212121, width: 1.2});
            }
        }
        app.stage.addChild(g);
        div.appendChild(app.canvas);
        const texture_green = await PIXI.Assets.load('alice1a_green.png');
        const sprite_green = new PIXI.Sprite(texture_green);
        app.stage.addChild(sprite_green);
        sprite_green.position.set(50, 50);
        sprite_green.scale.set(0.15);
        const texture_blue = await PIXI.Assets.load('alice1a_blue.png');
        const sprite_blue = new PIXI.Sprite(texture_blue);
        app.stage.addChild(sprite_blue);
        sprite_blue.position.set(50, 300);
        sprite_blue.scale.set(0.15);
        const texture_red = await PIXI.Assets.load('alice1a_red.png');
        const sprite_red = new PIXI.Sprite(texture_red);
        app.stage.addChild(sprite_red);
        sprite_red.position.set(300, 300);
        sprite_red.scale.set(0.15);
        app.ticker.add((time) => {
            //
        })

        const buttonH = document.getElementById('btn-h');
        buttonH.addEventListener('click', () => {
            buttonClicked('H');
        });

        const buttonJ = document.getElementById('btn-j');
        buttonJ.addEventListener('click', () => {
            buttonClicked('J');
        });

        const buttonK = document.getElementById('btn-k');
        buttonK.addEventListener('click', () => {
            buttonClicked('K');
        });

        const buttonL = document.getElementById('btn-l');
        buttonL.addEventListener('click', () => {
            buttonClicked('L');
        });

        window.addEventListener('keydown', (event) => {
            switch (event.key.toLowerCase()) {
                case 'h':
                    buttonClicked('H');
                    break;
                case 'j':
                    buttonClicked('J');
                    break;
                case 'k':
                    buttonClicked('K');
                    break;
                case 'l':
                    buttonClicked('L');
                    break;
            }
        });

        function buttonClicked(btn) {
            switch (btn) {
                case 'H':
                    sprite_green.x -= 10;
                    break;
                case 'J':
                    sprite_green.y += 10;
                    break;
                case 'K':
                    sprite_green.y -= 10;
                    break;
                case 'L':
                    sprite_green.x += 10;
                    break;
            }
            console.log(`[ ${btn} ${sprite_green.x} ${sprite_green.y} ] ${crypto.randomUUID()}`);
        }
    })();
</script>
<script crossorigin="anonymous"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
