services:
  postgres:
    image: docker.io/library/postgres:18.3-trixie
    container_name: nevenamail_araushi
    restart: unless-stopped
    environment:
      POSTGRES_DB: nevenamail_araushi
      POSTGRES_USER: nevenamail_araushi_admin
      POSTGRES_PASSWORD: nevenamail_araushi_secret
    ports:
      - "5432:5432"
    volumes:
      - ./pgdata:/var/lib/postgresql:Z
      - ./nevenamail_araushi:/docker-entrypoint-initdb.d:Z
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U nevenamail_araushi_admin -d nevenamail_araushi" ]
      interval: 5s
      timeout: 5s
      retries: 10