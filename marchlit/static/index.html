<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
          name="viewport">
    <meta content="ie=edge" http-equiv="X-UA-Compatible">
    <title>March Lit</title>
    <link href="https://igordurbek.b-cdn.net/crofavicon.png" rel="icon" type="image/png">
    <link href="/static/simple-greeting.css" rel="stylesheet">
</head>
<body class="p-8 bg-base-200 min-h-screen">
<div class="card bg-base-100 w-96 shadow-sm border border-base-300">
    <div class="card-body">
        <h2 class="card-title text-primary">March Lit</h2>
        <div class="card-actions justify-end">
            <simple-greeting name="MARCH-LIT-1"></simple-greeting>
            <simple-greeting></simple-greeting>
            <simple-greeting name="MARCH-LIT-3"></simple-greeting>
            <button class="btn btn-primary btn-sm"
                    onclick="console.log(crypto.randomUUID())">
                Daisy UI Button!
            </button>
        </div>
    </div>
</div>

<script src="/static/simple-greeting.js" type="module"></script>
<script>
    fetch('/api/version')
        .then(response => response.json())
        .then(data => {

            if ("{\"versions\":[\"0.1.0\"]}" === JSON.stringify(data)) {
                console.log("(+)");
            } else {
                console.log("(-)");
            }
        }).catch(error => console.error('Error fetching version:', error));
</script>
</body>
</html>
